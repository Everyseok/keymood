  <text x="40" y="84" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="15">White submarine body with red eye-flame accents from Half Ahead upward. Dark background is preview-only.</text>
