<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 56" role="img" aria-label="KeyMood Half Ahead submarine pet">
  <defs>
    <mask id="eye-cutouts">
      <rect width="96" height="56" fill="white"/>
      <rect x="63.4" y="32.5" width="8.3" height="3.7" rx="1.85" fill="black"/>
      <rect x="74.4" y="32.5" width="8.3" height="3.7" rx="1.85" fill="black"/>
    </mask>
    <style>
      .white { fill: #fff; }
      .flame_red { fill: #ff3b30; }
      .pet { animation: half-ahead-burst 1.05s ease-in-out infinite; transform-origin: 54px 35px; }
      .propeller { animation: half-ahead-spin .48s linear infinite; transform-origin: 17px 36px; }
      .smoke_puffs { animation: half-ahead-smoke 1.1s ease-in-out infinite; transform-origin: 48px 10px; }
      .eye_flames { animation: half-ahead-flame .7s ease-in-out infinite; transform-origin: 73px 33px; }
      @keyframes half-ahead-burst {
        0%, 100% { transform: translateY(0) rotate(-2deg); }
        42% { transform: translate(1px, -2px) rotate(-5deg); }
        62% { transform: translateY(1px) rotate(-1deg); }
      }
      @keyframes half-ahead-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes half-ahead-smoke {
        0%, 100% { opacity: .75; transform: translateY(0) scale(.95); }
        50% { opacity: 1; transform: translateY(-2px) scale(1.05); }
      }
      @keyframes half-ahead-flame {
        0%, 100% { transform: scale(.95); opacity: .86; }
        50% { transform: scale(1.08); opacity: 1; }
      }
    </style>
  </defs>
  <g class="wake_marks white">
    <ellipse cx="8" cy="42" rx="3.2" ry="1.1"/>
    <ellipse cx="13" cy="48" rx="2.2" ry="1"/>
  </g>
  <g class="smoke_puffs white">
    <circle cx="40" cy="8.8" r="3.8"/>
    <circle cx="46" cy="11.8" r="3.7"/>
    <circle cx="51" cy="7.8" r="2.8"/>
  </g>
  <g class="pet">
    <g class="propeller white">
      <ellipse cx="17" cy="27.5" rx="4.2" ry="9.2"/>
      <ellipse cx="17" cy="44.5" rx="4.2" ry="9.2"/>
    </g>
    <rect class="propeller_mount white" x="22" y="32" width="9" height="8" rx="1.5"/>
    <path class="body white" mask="url(#eye-cutouts)" d="M30 36c1.7-10.3 10-14.6 24-14.6h15.5C81 21.4 89 28 89 36.2 89 44 81.2 50 69.5 50H43.8C35.5 50 29.4 44 30 36z"/>
    <path class="underside_fin white" d="M43 47c-2.4 4.2-7.1 5.8-10.4 4.2-2.4-1.2-1.5-4.5 1.8-6.8l11.5-4.5c.2 3.2-.7 5.4-2.9 7.1z"/>
    <rect class="chimney white" x="50" y="13" width="8" height="11" rx="2"/>
    <rect class="chimney_cap white" x="47" y="11" width="17" height="5" rx="2.5"/>
    <g class="eye_flames flame_red">
      <path d="M63.2 34.6c1.1-3.8 3.7-5.8 6.7-6.7-.8 2.1-.2 3.8 1.7 5.5-2.4-.6-4.8-.2-8.4 1.2z"/>
      <path d="M74.3 34.6c1.1-3.8 3.7-5.8 6.7-6.7-.8 2.1-.2 3.8 1.7 5.5-2.4-.6-4.8-.2-8.4 1.2z"/>
    </g>
    <circle class="eye_left_highlight white" cx="69.8" cy="33.1" r="1.05"/>
    <circle class="eye_right_highlight white" cx="80.8" cy="33.1" r="1.05"/>
  </g>
</svg>
